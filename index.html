<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,
 initial-scale=1.0, maximum-scale=1.0, user-scalable = no">
 <link rel="manifest" href="manifest.json">
 <meta name="theme-color" content="#000000">
 <title>공</title>
 <style>
  #player{
    width: 50px;
    height: 50px;
    background: yellow;
    border-radius: 50%;

    position: absolute;
    top: 100px;
    left: 100px;
  }
  button{
   width: 80px;
   height: 80px;
   background: gray;
   opacity: 0.5;
  }
  #leftButton,
  #rightButton {

   width: 80px;
   height: 80px;

   background: gray;
   opacity: 0.5;

   font-size: 40px;
   text-align: center;
   line-height: 80px;

   display: inline-block;

   user-select: none;
}
 </style>
</head>
<body>
 <div id="player"></div>
 <div id="leftButton">《</div>
 <div id="rightButton">》</div>
 <script>
  if ("serviceWorker" in navigator) {
   navigator.serviceWorker.register("sw.js");
  }
  let moveX = 0;
  let playerX = 100;
  setInterval(move, 16)
  function move() {
   playerX += moveX;
   document.getElementById("player").style.left = playerX + "px";
  } 
 </script>
</body>
</html>
